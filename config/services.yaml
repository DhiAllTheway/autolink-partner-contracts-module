# config/services.yaml
parameters:
    uploads_directory: '%kernel.project_dir%/public/uploads'
    twilio_sid: '%env(TWILIO_SID)%'
    twilio_auth_token: '%env(TWILIO_AUTH_TOKEN)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Explicitly define the UserController service and inject the uploads_directory parameter
    App\Controller\UserController:
        arguments:
            $uploadsDirectory: '%uploads_directory%'

    App\Controller\ArticleController:
        arguments:
            $uploadsDirectory: '%uploads_directory%'

    # Explicitly define the TwilioService with your credentials from environment variables
    App\Service\TwilioService:
        arguments:
            $twilioSid: '%twilio_sid%'
            $twilioAuthToken: '%twilio_auth_token%'
